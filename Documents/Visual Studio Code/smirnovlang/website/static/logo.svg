<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#793af5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#0d1117"/>
  
  <!-- Code brackets -->
  <text x="40" y="140" font-family="monospace" font-size="100" font-weight="bold" fill="url(#grad)">&lt;&gt;</text>
  
  <!-- Rocket -->
  <text x="150" y="50" font-size="40">🚀</text>
</svg>
